name: geo_fence_utils
description: Production-ready geofence calculations. Accurate distance (Haversine), circle & polygon detection, batch operations. 96% test coverage.
version: 2.0.1
homepage: https://github.com/MEET-1008/geo_fence_utils
repository: https://github.com/MEET-1008/geo_fence_utils
issue_tracker: https://github.com/MEET-1008/geo_fence_utils/issues
documentation: https://github.com/MEET-1008/geo_fence_utils/blob/main/README.md

topics:
  - geography
  - geolocation
  - geofencing
  - maps
  - distance

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Map dependencies for geo_widget module
  flutter_map: ^7.0.2              # For OpenStreetMap (free)
  google_maps_flutter: ^2.9.0      # For Google Maps
  latlong2: ^0.9.1                 # Required by flutter_map

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  test: ^1.25.7

flutter:
  uses-material-design: true
